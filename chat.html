<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>RIFT Chat - Beta Publique</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10a37f;
            --primary-dark: #0d8f6d;
            --secondary: #6366f1;
            --accent: #f59e0b;
            --background: #000000;
            --surface: #111111;
            --surface-light: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --border: #2a2a2a;
            --glow: rgba(16, 163, 127, 0.5);
            --error: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
            position: relative;
            display: inline-block;
            letter-spacing: 0.1em;
        }

        .beta-badge {
            position: absolute;
            top: -8px;
            right: -20px;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            color: white;
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 15px rgba(16, 163, 127, 0.3);
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            animation: underlineSlide 2s ease-in-out infinite;
        }

        @keyframes underlineSlide {
            0%, 100% { width: 0; left: 0; }
            50% { width: 100%; left: 0; }
        }

        .logo-text {
            display: inline-block;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            position: relative;
            padding: 0.5rem 0;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        .nav-link:hover::before {
            width: 100%;
        }

        /* Mobile Hamburger Menu */
        .hamburger-btn {
            display: none;
            flex-direction: column;
            gap: 0.4rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
        }

        .hamburger-btn span {
            width: 25px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .hamburger-btn.active span:nth-child(1) {
            transform: rotate(45deg) translate(10px, 10px);
        }

        .hamburger-btn.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger-btn.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 80px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 999;
            flex-direction: column;
            gap: 0.5rem;
            padding: 1rem 2rem;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
        }

        .mobile-menu.active {
            display: flex;
        }

        .mobile-menu a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .mobile-menu a:hover {
            background: rgba(16, 163, 127, 0.1);
            color: var(--primary);
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            width: 100%;
            max-width: 100%;
            margin: 80px 0 0 0;
            background: linear-gradient(145deg, var(--surface), rgba(255, 255, 255, 0.02));
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            height: calc(100vh - 80px);
            min-height: calc(100vh - 80px);
            position: relative;
        }

        .chat-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
        }

        /* Sidebar */
        .chat-sidebar {
            width: 300px;
            flex-shrink: 0;
            background: linear-gradient(145deg, var(--surface-light), rgba(255, 255, 255, 0.01));
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .chat-sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--primary), transparent);
            opacity: 0.1;
            border-radius: 50%;
        }

        .new-chat-btn {
            width: 100%;
            padding: 1.25rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(16, 163, 127, 0.25);
        }

        .new-chat-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        /* Responsive Design */
        /* Responsive Design */
        @media (max-width: 768px) {
            header {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 1000;
            }
            
            nav {
                padding: 1rem 1rem;
            }
            
            nav > div {
                display: none !important;
            }
            
            .hamburger-btn {
                display: flex !important;
            }
            
            .logo {
                font-size: 1.5rem;
            }
            
            html, body {
                height: 100vh;
                overflow: hidden;
                width: 100vw;
                position: fixed;
                touch-action: pan-y;
            }
            
            .chat-container {
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
                width: 100vw;
                max-width: 100vw;
                margin-top: 80px;
            }
            
            .chat-sidebar {
                position: fixed;
                left: -100%;
                top: 80px;
                width: 80%;
                max-width: 300px;
                height: calc(100vh - 80px);
                z-index: 998;
                transition: left 0.3s ease;
                background: var(--surface);
            }
            
            .chat-sidebar.active {
                left: 0;
            }
            
            .chat-main {
                width: 100vw;
                margin-left: 0;
                height: calc(100vh - 80px);
                display: flex;
                flex-direction: column;
                overflow: hidden;
                max-width: 100vw;
            }
            
            .chat-header {
                padding: 0.6rem 1rem;
                height: 50px;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: space-between;
                width: 100%;
                max-width: 100vw;
                box-sizing: border-box;
            }
            
            .chat-title {
                font-size: 0.9rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                flex: 1;
            }
            
            .chat-messages {
                flex: 1;
                overflow-y: auto;
                padding: 1rem 0.8rem 0.8rem;
                display: flex;
                flex-direction: column;
                width: 100%;
                box-sizing: border-box;
            }
            
            .chat-input-container {
                position: relative;
                padding: 1rem 0.8rem;
                background: var(--surface);
                border-top: 1px solid var(--border);
                flex-shrink: 0;
                z-index: 100;
                display: flex;
                align-items: flex-end;
                gap: 0.8rem;
                width: 100%;
                box-sizing: border-box;
            }
            
            .chat-input-wrapper {
                flex: 1;
                display: flex;
                gap: 0.8rem;
                align-items: flex-end;
                min-width: 0;
            }
            
            .chat-input {
                font-size: 0.9rem;
                padding: 0.5rem 0.8rem;
                min-height: 40px;
                max-height: 60px;
                width: 100%;
                box-sizing: border-box;
            }
            
            .send-btn {
                width: 32px;
                height: 32px;
                flex-shrink: 0;
            }
            
            .image-upload-btn {
                width: 32px;
                height: 32px;
                padding: 0.5rem;
                flex-shrink: 0;
            }
            
            .plan-indicator {
                font-size: 0.6rem;
                padding: 0.2rem 0.4rem;
                white-space: nowrap;
            }
            
            .menu-toggle {
                font-size: 1rem;
                padding: 0.2rem;
                flex-shrink: 0;
            }
            
            .uploaded-image {
                max-width: 120px;
                max-height: 120px;
            }
            
            .code-block {
                margin: 0.2rem 0;
                max-width: 100%;
                overflow-x: auto;
            }
            
            .code-content {
                font-size: 0.7rem;
                padding: 0.6rem;
                white-space: pre-wrap;
                word-wrap: break-word;
            }
            
            .copy-code-btn {
                font-size: 0.5rem;
                padding: 0.1rem 0.3rem;
            }
        }

        /* Code Block Styling */
        .code-block {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            margin: 0.5rem 0;
            overflow: hidden;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            position: relative;
        }

        .chat-header {
            padding: 1.5rem 2rem;
            height: 80px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .code-header {
            background: #2d2d2d;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #999;
        }

        .code-content {
            padding: 1rem;
            color: #d4d4d4;
            font-size: 0.9rem;
            line-height: 1.5;
            overflow-x: auto;
            white-space: pre;
        }

        .copy-code-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .copy-code-btn:hover {
            background: var(--primary-dark);
        }

        /* Image Upload */
        .image-upload-btn {
            background: linear-gradient(145deg, var(--surface-light), rgba(255, 255, 255, 0.05));
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: var(--primary);
            padding: 0.8rem;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }

        .image-upload-btn:hover {
            background: rgba(16, 163, 127, 0.1);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 163, 127, 0.2);
        }

        .image-upload-btn svg {
            transition: transform 0.2s ease;
        }

        .image-upload-btn:hover svg {
            transform: scale(1.1);
        }

        .uploaded-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            margin: 0.5rem 0;
            cursor: pointer;
        }

        .uploaded-images {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }

        .message .uploaded-images {
            margin-bottom: 0.5rem;
        }

        .message .uploaded-image {
            max-width: 150px;
            max-height: 150px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .message .uploaded-image:hover {
            transform: scale(1.05);
        }

        .image-preview {
            position: relative;
            display: inline-block;
            margin: 0.5rem 0;
        }

        .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--error);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        /* Menu Toggle for Mobile */
        .menu-toggle {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
        }

        .new-chat-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(16, 163, 127, 0.35);
            background: linear-gradient(135deg, var(--secondary), var(--primary));
        }

        .clear-cache-btn {
            width: 100%;
            padding: 0.6rem;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .clear-cache-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding: 0.5rem 0;
        }

        .chat-history::-webkit-scrollbar {
            display: none;
        }

        .chat-history {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .chat-history-item {
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            background: linear-gradient(145deg, var(--surface-light), rgba(255, 255, 255, 0.02));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-history-content {
            flex: 1;
            cursor: pointer;
        }

        .delete-chat-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error);
            border-radius: 8px;
            padding: 0.5rem;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-history-item:hover .delete-chat-btn {
            opacity: 1;
        }

        .delete-chat-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: scale(1.1);
        }

        .chat-history-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(16, 163, 127, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .chat-history-item:hover::before {
            left: 100%;
        }

        .chat-history-item:hover {
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            color: white;
            transform: translateX(8px) scale(1.02);
            box-shadow: 0 8px 25px rgba(16, 163, 127, 0.25);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .chat-history-item.active {
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 6px 20px rgba(16, 163, 127, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .chat-history-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
        }

        .chat-history-preview {
            color: var(--text-secondary);
            font-size: 0.8rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Main Chat Area */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(145deg, var(--surface), rgba(255, 255, 255, 0.02));
            height: 100%;
            overflow: hidden;
            position: relative;
            border: none;
        }

        .chat-main::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, var(--secondary), transparent);
            opacity: 0.05;
            border-radius: 50%;
        }

        .chat-header {
            padding: 1.5rem 2rem;
            background: linear-gradient(145deg, var(--surface), rgba(255, 255, 255, 0.02));
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-align: center;
            position: relative;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .connection-status.online {
            background: rgba(16, 163, 127, 0.2);
            border: 1px solid rgba(16, 163, 127, 0.3);
            color: var(--success);
        }

        .connection-status.offline {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.online {
            background: var(--success);
        }

        .status-dot.offline {
            background: var(--error);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chat-messages::-webkit-scrollbar {
            display: none;
        }

        .chat-messages {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .message {
            margin-bottom: 1.5rem;
            padding: 1.25rem 1.75rem;
            border-radius: 18px;
            max-width: 75%;
            word-wrap: break-word;
            position: relative;
            transition: all 0.3s ease;
            animation: messageSlide 0.4s ease-out;
        }

        .message.user-message {
            margin-left: auto;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 8px 25px rgba(16, 163, 127, 0.2);
        }

        .message.user-message:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(16, 163, 127, 0.3);
        }

        .message.ai-message {
            background: linear-gradient(145deg, var(--surface-light), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .message.ai-message:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            border-color: rgba(16, 163, 127, 0.2);
        }

        .message-content {
            line-height: 1.6;
        }

        .message-time {
            font-size: 0.75rem;
            opacity: 0.6;
            margin-top: 0.5rem;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            padding: 1.5rem;
            background: linear-gradient(145deg, var(--surface-light), rgba(16, 163, 127, 0.05));
            border: 1px solid rgba(16, 163, 127, 0.2);
            border-radius: 18px;
            max-width: 70%;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.3s ease-out;
        }

        .typing-bubbles {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }

        .typing-bubble {
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            animation: bubbleFloat 1.6s ease-in-out infinite;
            box-shadow: 0 3px 12px rgba(16, 163, 127, 0.4);

        async function detectAndNameChat(userMessage, aiResponse) {
            // Si le chat a déjà un nom personnalisé, ne pas changer
            if (chats[currentChatId] && chats[currentChatId].chatName && !chats[currentChatId].chatName.startsWith('Chat ')) {
                return;
            }
            
            try {
                // Utiliser l'IA pour générer un titre concis de 2 mots maximum
                
                const titlePrompt = `Génère un titre de 2 mots maximum pour cette conversation. Sois direct et précis.
Exemples: "Code JavaScript", "Design Interface", "API Rest", "Base Données".

Message: "${userMessage.substring(0, 80)}"
Réponse: "${aiResponse.substring(0, 80)}"

Titre (2 mots max):`;
                
                const response = await fetch('http://localhost:11434/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'mistral:latest',
                        prompt: titlePrompt,
                        stream: false,
                        options: { temperature: 0.2, max_tokens: 15, top_p: 0.9, stop: ['\n'] }
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    let suggestedTitle = data.response.trim();
                    
                    // Nettoyer et formater le titre
                    suggestedTitle = suggestedTitle.replace(/["']/g, '').replace(/\n/g, '').trim();
                    suggestedTitle = suggestedTitle.split(' ').slice(0, 2).join(' '); // Max 2 mots
                    
                    // Capitaliser correctement
                    suggestedTitle = suggestedTitle.split(' ').map(word => 
                        word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
                    ).join(' ');
                    
                    // Valider que le titre est pertinent
                    const genericWords = ['chat', 'discussion', 'sujet', 'question', 'aide', 'info', 'texte', 'message', 'réponse'];
                    const words = suggestedTitle.toLowerCase().split(' ');
                    const isGeneric = words.length > 0 && words.every(word => genericWords.includes(word));
                    
                    if (suggestedTitle.length > 3 && !isGeneric && words.length >= 2) {
                        // Mettre à jour le nom du chat
                        if (!chats[currentChatId]) {
                            chats[currentChatId] = [];
                        }
                        chats[currentChatId].chatName = suggestedTitle;
                        
                        // Mettre à jour l'affichage
                        updateChatHistoryUI();
                        saveChatsToStorage();
                        
                        // Mettre à jour le titre dans l'interface
                        const chatTitle = document.querySelector('.chat-title');
                        if (chatTitle) {
                            chatTitle.textContent = `RIFT Chat - ${suggestedTitle}`;
                        }
                    }
                }
            } catch (error) {
                // En cas d'erreur, utiliser le système de mots-clés comme fallback
                fallbackKeywordDetection(userMessage, aiResponse);
            }
        }

        function fallbackKeywordDetection(userMessage, aiResponse) {
            // Système de mots-clés comme fallback si l'IA ne répond pas
            const fullText = `${userMessage} ${aiResponse}`.toLowerCase();
            
            const categories = {
                'Code Dev': ['code', 'programmation', 'javascript', 'python', 'html', 'css', 'api', 'bug'],
                'Design UX': ['design', 'interface', 'ux', 'ui', 'couleur', 'logo', 'bouton'],
                'Marketing Business': ['marketing', 'business', 'vente', 'client', 'stratégie'],
                'IA Tech': ['intelligence artificielle', 'ia', 'machine learning', 'ollama', 'modèle'],
                'Projet Créa': ['projet', 'créer', 'idée', 'concept', 'application', 'site'],
                'Question Aide': ['aide', 'comment', 'pourquoi', 'explique', 'question', 'problème'],
                'Données Analyse': ['données', 'analyse', 'statistiques', 'base de données', 'sql'],
                'Sécurité': ['sécurité', 'protection', 'mot de passe', 'authentification'],
                'Cloud Héberg': ['cloud', 'hébergement', 'serveur', 'docker', 'domaine'],
                'Carrière Emploi': ['carrière', 'emploi', 'cv', 'entretien', 'salaire']
            };
            
            let detectedCategory = null;
            let maxScore = 0;
            
            for (const [category, keywords] of Object.entries(categories)) {
                let score = 0;
                keywords.forEach(keyword => {
                    if (fullText.includes(keyword)) score++;
                });
                if (score > maxScore && score >= 1) {
                    maxScore = score;
                    detectedCategory = category;
                }
            }
            
            if (detectedCategory) {
                if (!chats[currentChatId]) {
                    chats[currentChatId] = [];
                }
                chats[currentChatId].chatName = detectedCategory;
                updateChatHistoryUI();
                saveChatsToStorage();
                
                const chatTitle = document.querySelector('.chat-title');
                if (chatTitle) {
                    chatTitle.textContent = `RIFT Chat - ${detectedCategory}`;
                }
            }
        }

            messageDiv.className = 'message user-message';
            
            let messageHtml = '';
            
            // Ajouter les images si présentes
            if (uploadedImages.length > 0) {
                messageHtml += '<div class="uploaded-images">';
                uploadedImages.forEach(img => {
                    messageHtml += `<img src="${img.data}" class="uploaded-image" alt="${img.name}">`;
                });
                messageHtml += '</div>';
            }
            
            // Ajouter le texte du message
            if (message) {
                messageHtml += `<div class="message-content">${escapeHtml(message)}</div>`;
            }
            
            messageDiv.innerHTML = `${messageHtml}<div class="message-time">${getCurrentTime()}</div>`;
            messagesContainer.appendChild(messageDiv);
            
            console.log('✅ Message affiché dans le DOM');
            
            // Sauvegarder le message
            if (!chats[currentChatId]) {
                chats[currentChatId] = [];
            }
            
            const messageData = {
                content: message,
                type: 'user',
                time: getCurrentTime(),
                images: [...uploadedImages]
            };
            
            chats[currentChatId].push(messageData);
            saveChatsToStorage();
            updateChatHistoryUI();
            
            console.log('✅ Message sauvegardé');
            
            // Vider l'input et les images
            input.value = '';
            uploadedImages = [];
            document.getElementById('imagePreview').innerHTML = '';
            
            console.log('✅ Input et images vidés');
            
            // Faire défiler vers le bas
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            console.log('✅ Scroll vers le bas');
            
            // Envoyer à l'API
            console.log('🤖 Envoi à l\'API...');
            showTypingIndicator();
            sendToAPI(messageData);
        }

        async function sendToAPI(messageData) {
            try {
                // Vérifier la connexion Ollama
                const isOllamaConnected = await checkOllamaConnection();
                if (!isOllamaConnected) {
                    displayError('❌ Ollama n\'est pas connecté. Veuillez lancer: `ollama serve` dans un terminal');
                    return;
                }

                // Définir le plan et les paramètres
                const currentPlan = localStorage.getItem('rift_selected_plan') || 'free';
                const temperature = currentPlan === 'free' ? 0.7 : currentPlan === 'pro' ? 0.8 : 0.9;
                const maxTokens = currentPlan === 'free' ? 500 : currentPlan === 'pro' ? 800 : 2000;
                
                const conversationHistory = chats[currentChatId] || [];
                let contextPrompt = '';
                
                // SYSTÈME PROMPT - RIFT s'identifie
                const systemPrompt = `Tu es RIFT, un routeur IA intelligent créé par SYNAPSE AI. 
Tu aides les utilisateurs avec leurs requêtes en utilisant ton intelligence et ta mémoire contextuelle.
Tu es professionnel, amical et précis dans tes réponses.
Tu parles français comme demandé.
IMPORTANT: Sois concis et va droit au but.`;
                
                // Modèle par défaut
                let model = 'mistral:latest';
                
                // Construire le contexte avec le système prompt
                contextPrompt = `${systemPrompt}\n\n=== CONVERSATION ===\n`;
                
                // Ajouter l'historique (derniers 10 messages)
                const recentMessages = conversationHistory.slice(-10);
                recentMessages.forEach((msg, index) => {
                    if (msg.type === 'user') {
                        contextPrompt += `Utilisateur: ${msg.content}\n`;
                    } else {
                        contextPrompt += `RIFT: ${msg.content}\n`;
                    }
                });
                
                // Ajouter le message actuel avec les images
                let promptText = messageData.content || '';
                if (messageData.images && messageData.images.length > 0) {
                    promptText += '\n\nImages jointes: ';
                    promptText += messageData.images.map((img, index) => `[Image ${index + 1}: ${img.name}]`).join(', ');
                    promptText += '\n\nIMPORTANT: Analyse ces images avec précision. Distingue bien entre les personnes réelles et les mannequins. Identifie s\'il s\'agit de présentation de produits, d\'équipements de marque, ou de scènes réelles. Décris en détail ce que tu vois : objets, vêtements, composants, pièces, marques visibles, contexte (présentation produit vs utilisation réelle).';
                }
                
                contextPrompt += `Utilisateur: ${promptText}\nRIFT: `;
                
                // Utiliser l'IP locale pour mobile et localhost pour PC
                const ollamaUrl = window.OLLAMA_URL || (isMobile ? 'http://192.168.1.181:11434' : 'http://localhost:11434');
                
                // Appel à l'API Ollama
                console.log('🌐 Appel API vers:', ollamaUrl);
                console.log('📤 Envoi du prompt...');
                console.log('🔗 Proxy mode:', window.OLLAMA_PROXY ? 'OUI' : 'NON');
                
                let apiUrl, apiOptions;
                if (window.OLLAMA_PROXY) {
                    // Utiliser le proxy du serveur RIFT
                    apiUrl = `${ollamaUrl}/api/chat`;
                    apiOptions = {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: model,
                            prompt: contextPrompt,
                            stream: false,
                            options: { 
                                temperature: temperature,
                                top_p: currentPlan === 'free' ? 0.9 : currentPlan === 'pro' ? 0.92 : 0.95,
                                max_tokens: maxTokens,
                                num_ctx: currentPlan === 'free' ? 2048 : currentPlan === 'pro' ? 3072 : 4096,
                                repeat_penalty: 1.1, // Évite les répétitions
                                stop: ['\n\nHuman:', '\n\nUser:', '###'] // Arrêts propres
                            }
                        }),
                        signal: AbortSignal.timeout(30000) // Timeout 30 secondes
                    };
                } else {
                    // Connexion directe à Ollama
                    apiUrl = `${ollamaUrl}/api/generate`;
                    apiOptions = {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: model,
                            prompt: contextPrompt,
                            stream: false,
                            options: { 
                                temperature: temperature,
                                top_p: currentPlan === 'free' ? 0.9 : currentPlan === 'pro' ? 0.92 : 0.95,
                                max_tokens: maxTokens,
                                num_ctx: currentPlan === 'free' ? 2048 : currentPlan === 'pro' ? 3072 : 4096,
                                repeat_penalty: 1.1, // Évite les répétitions
                                stop: ['\n\nHuman:', '\n\nUser:', '###'] // Arrêts propres
                            }
                        }),
                        signal: AbortSignal.timeout(30000) // Timeout 30 secondes
                    };
                }
                
                const response = await fetch(apiUrl, apiOptions);
                
                console.log('📥 Réponse reçue, status:', response.status);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    console.error('❌ Erreur API:', errorData);
                    throw new Error(errorData.error || 'Erreur Ollama');
                }
                
                const data = await response.json();
                console.log('✅ Données reçues:', data);
                hideTypingIndicator();
                
                // Formater la réponse avec les blocs de code
                let formattedResponse = formatCodeBlocks(data.response);
                displayAIResponse(formattedResponse);
                
                if (chats[currentChatId]) {
                    chats[currentChatId].push({ 
                        type: 'ai', 
                        content: data.response, 
                        time: getCurrentTime() 
                    });
                    saveChatsToStorage();
                    updateChatHistoryUI();
                }
                
                // DÉTECTION AUTOMATIQUE DU SUJET en arrière-plan (non bloquant)
                if (data.response && !data.response.includes('❌')) {
                    setTimeout(() => detectAndNameChat(messageData.content, data.response), 500);
                }
                
            } catch (error) {
                hideTypingIndicator();
                console.error('❌ Erreur Ollama:', error);
                
                // Messages d'erreur spécifiques
                if (error.name === 'AbortError') {
                    displayError('❌ Timeout: L\'IA met trop de temps à répondre. Essayez avec un message plus court.');
                } else if (error.message.includes('model requires more system memory')) {
                    displayError('❌ Pas assez de RAM pour ce modèle. Essayez `mistral:latest` ou libérez de la mémoire.');
                } else if (error.message.includes('model not found')) {
                    displayError('❌ Modèle non trouvé. Installez-le avec: `ollama pull mistral:latest`');
                } else if (error.message.includes('ECONNREFUSED') || error.message.includes('NetworkError')) {
                    displayError('❌ Erreur de connexion au serveur IA. Vérifie que le backend fonctionne.');
                } else {
                    displayError(`❌ Erreur Ollama: ${error.message}`);
                }
            }
        }

        function displayAIResponse(response) {
            const messagesContainer = document.querySelector('.chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai-message';
            
            // Ajouter un indicateur des avantages du plan
            const currentPlan = localStorage.getItem('rift_selected_plan') || 'free';
            let planInfo = '';
            if (currentPlan === 'pro') {
                planInfo = `<div style="font-size: 0.8rem; color: #10b981; margin-top: 0.5rem;">🚀 PRO: Llama3 8B, Mémoire 20 msgs, Tokens 800</div>`;
            } else if (currentPlan === 'enterprise') {
                planInfo = `<div style="font-size: 0.8rem; color: #8b5cf6; margin-top: 0.5rem;">⭐ ENTREPRISE: Llama3 Max, Mémoire 50 msgs, Tokens 2000</div>`;
            } else {
                planInfo = `<div style="font-size: 0.8rem; color: #9ca3af; margin-top: 0.5rem;">🆓 FREE: Mistral 7B, Mémoire 5 msgs, Tokens 300</div>`;
            }
            
            messageDiv.innerHTML = `<div class="message-content">${escapeHtml(response)}</div><div class="message-time">${getCurrentTime()}</div>${planInfo}`;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // Sauvegarder la réponse de l'IA
            if (chats[currentChatId]) {
                chats[currentChatId].push({ type: 'ai', content: response, time: getCurrentTime() });
                saveChatsToStorage();
                updateChatHistoryUI(); // Mettre à jour l'historique
            }
        }

        function displayError(errorMessage) {
            const messagesContainer = document.querySelector('.chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai-message';
            messageDiv.style.background = 'rgba(239, 68, 68, 0.1)';
            messageDiv.style.borderLeft = '4px solid #ef4444';
            
            messageDiv.innerHTML = `<div class="message-content">${escapeHtml(errorMessage)}</div><div class="message-time">${getCurrentTime()}</div>`;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'flex';
        }

        function hideTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'none';
        }

        function getCurrentTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        function saveChatsToStorage() {
            try {
                // Limiter la taille des données stockées
                const optimizedChats = {};
                
                Object.keys(chats).forEach(chatId => {
                    const chat = chats[chatId];
                    optimizedChats[chatId] = chat.map(msg => {
                        const optimizedMsg = {
                            type: msg.type,
                            content: msg.content,
                            time: msg.time
                        };
                        
                        // Limiter la taille des images (compresser en miniature)
                        if (msg.images && msg.images.length > 0) {
                            optimizedMsg.images = msg.images.map(img => ({
                                name: img.name,
                                data: img.data.substring(0, 1000) + '...[truncated]' // Garder seulement le début
                            }));
                        }
                        
                        return optimizedMsg;
                    });
                });
                
                localStorage.setItem('rift_chats', JSON.stringify(optimizedChats));
            } catch (error) {
                if (error.name === 'QuotaExceededError') {
                    console.log('⚠️ Stockage plein, nettoyage des anciens chats...');
                    // Supprimer les anciens chats
                    const chatIds = Object.keys(chats);
                    if (chatIds.length > 5) {
                        const toDelete = chatIds.slice(0, chatIds.length - 5);
                        toDelete.forEach(id => delete chats[id]);
                        saveChatsToStorage(); // Réessayer
                    } else {
                        // Si même avec 5 chats ça ne passe pas, vider tout sauf le chat actuel
                        const currentChat = chats[currentChatId];
                        chats = {};
                        if (currentChat) {
                            chats[currentChatId] = currentChat;
                        }
                        localStorage.setItem('rift_chats', JSON.stringify(chats));
                    }
                } else {
                    console.error('Erreur sauvegarde:', error);
                }
            }
        }

        function loadChatsFromStorage() {
            const saved = localStorage.getItem('rift_chats');
            if (saved) chats = JSON.parse(saved);
        }

        function clearCache() {
            if (confirm('Vider tout l\'historique des chats ? Cette action est irréversible.')) {
                localStorage.removeItem('rift_chats');
                localStorage.removeItem('rift_selected_plan');
                chats = {};
                currentChatId = Date.now().toString();
                updateChatHistoryUI();
                console.log('✅ Cache vidé');
            }
        }

        function updateChatHistoryUI() {
            const historyList = document.getElementById('chatHistoryList');
            historyList.innerHTML = '';
            
            Object.keys(chats).forEach(chatId => {
                const chat = chats[chatId];
                const chatItem = document.createElement('div');
                chatItem.className = 'chat-history-item';
                
                // Récupérer le nom du chat (détecté automatiquement ou par défaut)
                let chatName = chat.chatName || `Chat ${Object.keys(chats).indexOf(chatId) + 1}`;
                
                // Récupérer le premier message comme aperçu
                const firstMessage = chat.find(msg => msg.type === 'user')?.content || 'Nouveau chat';
                const preview = firstMessage.length > 30 ? firstMessage.substring(0, 30) + '...' : firstMessage;
                
                chatItem.innerHTML = `
                    <div class="chat-info">
                        <div class="chat-name">${escapeHtml(chatName)}</div>
                        <div class="chat-preview">${escapeHtml(preview)}</div>
                    </div>
                    <button class="delete-chat-btn" onclick="deleteChat('${chatId}')">×</button>
                `;
                
                chatItem.onclick = (e) => {
                    if (!e.target.classList.contains('delete-chat-btn')) {
                        loadChat(chatId);
                    }
                };
                
                historyList.appendChild(chatItem);
            });
        }

        function deleteChat(chatId) {
            if (confirm('Êtes-vous sûr de vouloir supprimer ce chat ?')) {
                delete chats[chatId];
                saveChatsToStorage();
                updateChatHistoryUI();
                
                // Si le chat supprimé était le chat actuel, créer un nouveau
                if (currentChatId === chatId) {
                    startNewChat();
                }
            }
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updatePlanIndicator() {
            const plan = localStorage.getItem('rift_selected_plan') || 'free';
            const code = localStorage.getItem('rift_activation_code');
            const planIndicator = document.getElementById('planIndicator');
            const planText = document.getElementById('planText');
            
            if (!planIndicator || !planText) return;
            
            planText.textContent = plan.toUpperCase();
            
            // Style selon le plan
            const styles = {
                free: 'background: rgba(156, 163, 175, 0.2); border: 1px solid rgba(156, 163, 175, 0.3); color: #9ca3af;',
                pro: 'background: rgba(16, 163, 127, 0.2); border: 1px solid rgba(16, 163, 127, 0.3); color: #10b981;',
                enterprise: 'background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(59, 130, 246, 0.2)); border: 1px solid rgba(139, 92, 246, 0.3); color: #8b5cf6;'
            };
            
            planIndicator.style.cssText = `padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; ${styles[plan] || styles.free}`;
            
            // Ajouter l'info de code si présent
            if (code) {
                planText.textContent = `${plan.toUpperCase()} 🔑`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadChatsFromStorage();
            if (Object.keys(chats).length === 0) {
                startNewChat();
            } else {
                currentChatId = Object.keys(chats)[0];
                loadChat(currentChatId);
            }
            updateChatHistoryUI();
            updatePlanIndicator(); // Mettre à jour l'indicateur de plan
        });
    </script>
</body>
</html>
